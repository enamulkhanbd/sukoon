<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sukoon - Divine Flow Quran Player</title>
    <meta name="description" content="A tranquil, frictionless Quran listening experience with beautiful recitations." />
    <meta name="theme-color" content="#f4ecd8" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sukoon" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Montserrat:wght@300;400;500;600&family=Vibes&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-6 bg-cream">
    
    <div id="app" class="w-full max-w-2xl flex flex-col items-center gap-8 md:gap-10">
      
      <!-- Brand Header -->
      <div class="text-center flex flex-col items-center gap-2">
        <h1 class="font-alhabsyi text-7xl md:text-8xl text-gold drop-shadow-sm tracking-wide mt-4">سكون</h1>
        <p class="font-montserrat text-xs md:text-sm tracking-widest uppercase opacity-60">Frictionless Flow</p>
      </div>
      
      <!-- Audio Player Container -->
      <div class="w-full bg-[#FCFAF5]/70 backdrop-blur-md rounded-3xl p-6 md:p-10 border border-gold/20 flex flex-col gap-8 md:gap-10">
        
        <!-- Selection Controls -->
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between w-full border-b border-[#e8dcb8]/50 pb-5 mb-2 gap-4">
          <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 items-stretch sm:items-center flex-1">
            
            <!-- Mode Dropdown -->
            <div class="relative w-full sm:w-auto" id="mode-dropdown-container">
              <button id="mode-dropdown-btn" class="w-full sm:w-auto justify-center sm:justify-start bg-sepia-dark/5 focus:bg-sepia-dark/8 font-montserrat text-xs text-sepia-dark/80 font-medium px-4 py-2 sm:py-1.5 rounded-full outline-none cursor-pointer hover:bg-sepia-dark/8 transition-colors flex items-center gap-2">
                <span id="mode-dropdown-label">Surah Mode</span>
                <i class="fa-solid fa-chevron-down text-[10px] opacity-70"></i>
              </button>
              <div id="mode-dropdown-menu" class="w-full sm:w-36 absolute top-full mt-2 left-0 bg-[#FCFAF5] border border-[#e8dcb8] rounded-md py-1.5 z-20 hidden flex-col transform origin-top transition-all duration-200">
                <button class="text-left px-4 py-2 text-xs text-sepia-dark/80 hover:bg-[#f0e6d2] hover:text-gold transition-colors font-medium w-full" data-value="chapter">Surah Mode</button>
                <button class="text-left px-4 py-2 text-xs text-sepia-dark/80 hover:bg-[#f0e6d2] hover:text-gold transition-colors font-medium w-full" data-value="juz">Juz Mode</button>
              </div>
            </div>

            <!-- Item Dropdown -->
            <div class="relative flex-1 w-full sm:w-auto" id="item-dropdown-container">
              <button id="item-dropdown-btn" class="w-full justify-center sm:justify-start bg-transparent font-montserrat text-sm text-sepia-dark outline-none cursor-pointer hover:text-gold transition-colors flex items-center gap-3 sm:max-w-[220px] text-center sm:text-left">
                <span id="item-dropdown-label" class="truncate">Loading...</span>
                <i class="fa-solid fa-chevron-down text-[10px] opacity-70 flex-shrink-0"></i>
              </button>
              <div id="item-dropdown-menu" class="w-full sm:w-[260px] custom-scrollbar absolute top-full mt-2 left-0 bg-[#FCFAF5] border border-[#e8dcb8] rounded-xl py-2 z-20 hidden flex-col max-h-64 overflow-y-auto transform origin-top transition-all duration-200">
                <!-- Dropdown items will be injected here -->
              </div>
            </div>

          </div>
          <!-- Reciter Dropdown -->
          <div class="relative flex-shrink-0 w-full sm:w-auto" id="reciter-dropdown-container">
            <button id="reciter-dropdown-btn" class="w-full justify-center sm:justify-start text-xs font-montserrat text-sepia-dark/80 hover:text-sepia-dark bg-sepia-dark/5 hover:bg-sepia-dark/8 px-4 py-2 sm:py-1.5 rounded-full border border-sepia-dark/8 flex items-center gap-2 outline-none cursor-pointer transition-colors sm:max-w-[140px]">
              <span id="reciter-dropdown-label" class="truncate">Mishary Rashid Alafasy</span>
              <i class="fa-solid fa-chevron-down text-[10px] opacity-70"></i>
            </button>
            <div id="reciter-dropdown-menu" class="w-full sm:w-[240px] custom-scrollbar absolute top-full right-0 mt-2 bg-[#FCFAF5] border border-[#e8dcb8] rounded-xl py-2 z-20 hidden flex-col max-h-64 overflow-y-auto transform origin-top transition-all duration-200">
                <!-- Dropdown items will be injected here -->
            </div>
          </div>
        </div>

        <!-- Current Verse Display -->
        <div class="flex flex-col items-center gap-6">
          <p class="font-amiri text-3xl md:text-5xl text-center leading-relaxed md:leading-relaxed text-sepia-dark transition-opacity duration-300">
            بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ
          </p>
          <p class="font-montserrat text-sm opacity-50" id="verse-info">Surah Al-Fatihah, Verse 1</p>
        </div>
        
        <!-- Player Controls -->
        <div class="flex flex-col gap-6 w-full">
          
          <!-- Progress Bar -->
          <div class="flex items-center gap-4 text-xs font-montserrat opacity-60">
            <span id="current-time-disp">0:00</span>
            <div class="flex-1 h-1.5 bg-[#e8dcb8] rounded-full overflow-hidden cursor-pointer" id="progress-container">
              <div id="progress-bar-fill" class="h-full bg-gold w-0 transition-all duration-300"></div>
            </div>
            <span id="end-time-disp">0:00</span>
          </div>
          
          <!-- Action Buttons -->
          <div class="flex justify-center items-center gap-10 text-sepia-dark">
            <button class="text-2xl opacity-40 hover:opacity-100 hover:text-gold transition-colors duration-300">
              <i class="fa-solid fa-backward-step"></i>
            </button>
            <button class="text-5xl text-gold hover:scale-105 transition-transform duration-300">
              <i class="fa-solid fa-circle-play"></i>
            </button>
            <button class="text-2xl opacity-40 hover:opacity-100 hover:text-gold transition-colors duration-300">
              <i class="fa-solid fa-forward-step"></i>
            </button>
          </div>
          
        </div>
      </div>
      
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
